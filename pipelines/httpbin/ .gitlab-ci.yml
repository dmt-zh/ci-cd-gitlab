stages:
  - report

variables:
  API_URL: https://httpbin.org

send-report:
  tags:
    - local
  stage: report
  image: alpine:3.22
  script:
      - apk add --no-cache curl
      - 'curl -XGET "$API_URL/get" -H "AUTH-TOKEN: $API_TOKEN" -H "Commit-Timestamp: $CI_COMMIT_TIMESTAMP" -H "Commit-Short-Sha: $CI_COMMIT_SHORT_SHA"'
